<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="backend-url" content="https://talkfree-uwjd.onrender.com" />
  <title>Talkfree by Nader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="authSection" class="panel auth-panel">
      <h1>Talkfree</h1>
      <p class="subtitle">Real-time group + private chat</p>
      <form id="authForm">
        <label for="username">Username</label>
        <input id="username" name="username" minlength="3" maxlength="20" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="4" required />

        <div class="auth-actions">
          <button type="button" id="registerBtn">Register</button>
          <button type="button" id="loginBtn">Login</button>
        </div>
        <p id="authMessage" class="hint"></p>
      </form>
    </section>

    <section id="chatSection" class="chat-layout hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Conversations</h2>
          <p id="meBadge"></p>
        </div>

        <div class="list-block">
          <h3>Groups</h3>
          <div class="inline-form">
            <input id="newGroupName" placeholder="Create group name" maxlength="30" />
            <button id="createGroupBtn">Create</button>
          </div>
          <ul id="groupList"></ul>
        </div>

        <div class="list-block">
          <h3>Users</h3>
          <ul id="userList"></ul>
        </div>
      </aside>

      <section class="chat-main">
        <header class="chat-header">
          <h2 id="chatTitle">Select a chat</h2>
          <p id="presenceText" class="presence"></p>
        </header>

        <div class="call-bar">
          <div id="callStatus" class="call-status">Video call ready</div>
          <div class="call-actions">
            <button id="callBtn" type="button">Call</button>
            <button id="hangupBtn" type="button" class="danger hidden">Hang up</button>
            <button id="muteBtn" type="button" class="ghost hidden">Mute</button>
            <button id="cameraBtn" type="button" class="ghost hidden">Camera off</button>
          </div>
        </div>

        <div id="videoGrid" class="video-grid hidden">
          <div class="video-tile">
            <video id="localVideo" autoplay playsinline muted></video>
            <span class="video-label">You</span>
          </div>
          <div class="video-tile">
            <video id="remoteVideo" autoplay playsinline></video>
            <span class="video-label" id="remoteLabel">Remote</span>
          </div>
        </div>

        <div id="messageList" class="messages"></div>
        <p id="typingText" class="typing"></p>

        <form id="messageForm" class="message-form">
          <input id="messageInput" placeholder="Write a message..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <div id="incomingCall" class="incoming-call hidden" aria-live="polite">
    <div class="incoming-card">
      <p id="incomingText" class="incoming-text">Incoming call</p>
      <div class="incoming-actions">
        <button id="acceptCallBtn" type="button">Accept</button>
        <button id="rejectCallBtn" type="button" class="danger">Reject</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
